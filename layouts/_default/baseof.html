<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.description }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Params.description }}{{ .Params.description }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{ .Title }} · {{ .Site.Title }}" />
  <meta property="og:description" content="{{ .Site.Params.description }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ .Permalink }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/main.css" />

  <!-- Canonical -->
  <link rel="canonical" href="{{ .Permalink }}" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
</head>
<body>



  <!-- ── PAGE CONTENT -->
  {{ block "main" . }}{{ end }}

  <!-- ── FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-logo">StitchIndex</span>
      <nav class="footer-links">
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/submit/">Submit a link</a>
      </nav>
      <span class="footer-copy">Free to use · No ads · Curated with care</span>
    </div>
  </footer>

  <script src="/js/main.js"></script>
</body>
</html>
